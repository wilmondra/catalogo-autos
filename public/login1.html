<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Motors - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="overlay">
        <div class="login-box">
            <h1>Luxury Motors</h1>
            <p>Accede a tu cuenta</p>

            <div id="error-msg" class="error-msg" style="display:none;"></div>

            <div class="input-group">
                <input type="text" id="usuario" name="usuario" placeholder="Usuario" required autocomplete="username">
            </div>

            <div class="input-group password-group">
                <input type="password" id="contraseña" name="contraseña" placeholder="Contraseña" required autocomplete="current-password">
                <button type="button" class="toggle-pass" onclick="togglePass()" title="Mostrar/ocultar contraseña">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>

            <button id="btn-login" onclick="iniciarSesion()">Iniciar Sesión</button>

        </div>
    </div>

    <script>
    function togglePass() {
        const input = document.getElementById("contraseña");
        input.type = input.type === "password" ? "text" : "password";
    }

    async function iniciarSesion() {
        const usuario = document.getElementById("usuario").value.trim();
        const contraseña = document.getElementById("contraseña").value;
        const btn = document.getElementById("btn-login");
        const errorDiv = document.getElementById("error-msg");

        errorDiv.style.display = "none";

        if (!usuario || !contraseña) {
            mostrarError("Por favor completa todos los campos.");
            return;
        }

        btn.textContent = "Verificando...";
        btn.disabled = true;

        try {
            const res = await fetch("/login1", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ usuario, contraseña })
            });
            const data = await res.json();

            if (data.success) {
                btn.textContent = "¡Bienvenido!";
                window.location.href = "/entrada";
            } else {
                mostrarError(data.error || "Credenciales incorrectas.");
                btn.textContent = "Iniciar Sesión";
                btn.disabled = false;
            }
        } catch (e) {
            mostrarError("Error de conexión. Intenta de nuevo.");
            btn.textContent = "Iniciar Sesión";
            btn.disabled = false;
        }
    }

    function mostrarError(msg) {
        const div = document.getElementById("error-msg");
        div.textContent = msg;
        div.style.display = "block";
    }

    // Enter para login
    document.addEventListener("DOMContentLoaded", () => {
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") iniciarSesion();
        });
    });
    </script>
</body>
</html>
